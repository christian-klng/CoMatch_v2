server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: every unknown path falls back to index.html so React Router works
  # on hard reloads / deep links (e.g. /matches/p3).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed build assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
