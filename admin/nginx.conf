server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Lightweight health endpoint for Coolify (port 80, path /health).
  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # SPA fallback (single page, but keeps deep links / reloads working).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed build assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
